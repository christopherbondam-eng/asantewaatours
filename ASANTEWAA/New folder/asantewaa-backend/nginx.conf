# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for Asantewaa's Tour
# Place at: /etc/nginx/sites-available/asantewaa-tour
# Enable: ln -s /etc/nginx/sites-available/asantewaa-tour /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=forms:10m rate=5r/m;

upstream asantewaa_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name asantewaatoursghana.com www.asantewaatoursghana.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name asantewaatoursghana.com www.asantewaatoursghana.com;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/asantewaatoursghana.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asantewaatoursghana.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # Client body limit (for media uploads)
    client_max_body_size 20M;

    # ── Static frontend ──────────────────────────────────────────────────────
    root /var/www/asantewaa-tour/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://asantewaa_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Stricter rate limiting on booking/contact forms
    location ~* ^/api/(book|contact|subscribe) {
        limit_req zone=forms burst=3 nodelay;
        proxy_pass http://asantewaa_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploads ───────────────────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/asantewaa-tour/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Block access to hidden files
    location ~ /\. { deny all; }
}
